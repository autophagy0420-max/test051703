<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="부흥고등학교의 당일 급식 정보를 실시간으로 확인하고, 알레르기 물질 필터링 및 영양 성분을 분석하는 프리미엄 급식 정보 알리미 서비스입니다.">
  <title>경기 부흥고등학교 급식알리미</title>
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Header Block -->
    <header>
      <div class="brand">
        <span class="brand-logo">🏫</span>
        <div class="brand-info">
          <h1>부흥고등학교 급식알리미</h1>
          <p>경기도교육청 • NEIS 공공데이터</p>
        </div>
      </div>
      <button class="theme-toggle-btn" id="theme-toggle-btn" aria-label="테마 변경">🌙</button>
    </header>

    <!-- Control Bar Block -->
    <div class="control-bar">
      <!-- Date Quick Navigator -->
      <div class="date-navigator">
        <button class="nav-btn" id="prev-day-btn" title="이전날 급식">
          <span>◀</span> 이전
        </button>
        <div class="date-display-wrapper">
          <div class="current-date-text" id="current-date-text">2026년 05월 18일</div>
          <span class="day-badge" id="day-badge">월요일</span>
        </div>
        <button class="nav-btn" id="next-day-btn" title="다음날 급식">
          다음 <span>▶</span>
        </button>
      </div>

      <!-- Custom Date Picker -->
      <div class="calendar-wrapper" title="원하는 날짜 선택">
        <span class="calendar-icon">📅</span>
        <input type="date" class="date-picker-input" id="date-picker-input" aria-label="급식 날짜 선택">
        <button class="nav-btn today-btn" id="today-btn" title="오늘 날짜로 이동">오늘</button>
      </div>
    </div>

    <!-- Utility panel -->
    <div class="utility-panel">
      <!-- Allergen Toggle -->
      <label class="toggle-switch-container" for="allergen-toggle-checkbox">
        <input type="checkbox" id="allergen-toggle-checkbox" checked>
        <div class="toggle-switch"></div>
        <span class="toggle-switch-label">알레르기 유발 정보 표시</span>
      </label>
      
      <!-- Allergen Modal Trigger -->
      <div class="allergen-info-trigger" id="allergen-info-trigger" role="button" tabindex="0">
        ℹ️ 알레르기 성분 일람
      </div>
    </div>

    <!-- Main Meal Display Section -->
    <main class="meal-display-area" id="meal-display-area">
      <!-- Cards will be dynamically generated by JS -->
    </main>

    <!-- Footer Block -->
    <footer>
      <p>© 2026 부흥고등학교 급식알리미. All rights reserved.</p>
      <p style="margin-top: 0.25rem; font-size: 0.75rem;">본 서비스는 교육부 NEIS Open API 데이터를 사용하여 실시간 정보를 제공합니다.</p>
    </footer>

  </div>

  <!-- Allergen Info Modal Overlay -->
  <div class="modal-overlay" id="allergen-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-window">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">알레르기 유발 물질 가이드</h3>
        <button class="modal-close-btn" id="modal-close-btn" aria-label="닫기">×</button>
      </div>
      <div class="modal-body">
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem; line-height: 1.5;">
          식단 메뉴 우측에 표시된 숫자는 해당 식재료에 포함된 알레르기 유발 물질 번호입니다. 식사 전 반드시 본인의 알레르기 요소를 대조해 보시기 바랍니다.
        </p>
        <div class="allergen-grid" id="allergen-grid">
          <!-- Items will be generated by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Javascript Logic -->
  <script src="script.js"></script>
</body>
</html>
